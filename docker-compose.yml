services:
  backend:
    build:
      context: ./backend
    environment:
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-dev-docker-change-me}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      NODE_ENV: production
      PORT: 5000
      SESSION_TTL_MINUTES: ${SESSION_TTL_MINUTES:-60}
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
