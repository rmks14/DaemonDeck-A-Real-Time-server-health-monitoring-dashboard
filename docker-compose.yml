services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost:8080
      SESSION_TTL_MINUTES: ${SESSION_TTL_MINUTES:-60}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-change-this-local-docker-secret}
      DATABASE_PATH: /app/data/daemondeck.sqlite
    volumes:
      - daemondeck-data:/app/data
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  daemondeck-data:
